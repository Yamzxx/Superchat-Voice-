<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --muted: #8891a8;
    --accent: #4ade80;
    --accent2: #22d3ee;
    --danger: #f87171;
    --amber: #fbbf24;
    --pulse: rgba(74,222,128,0.3);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(74,222,128,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header {
    text-align: center;
    padding: 8px 0 4px;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .header p {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .call-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  .call-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(74,222,128,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .avatar-ring {
    position: relative;
    width: 96px;
    height: 96px;
  }

  .avatar-ring .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid;
    animation: none;
  }

  .ring-1 { inset: -8px; border-color: rgba(74,222,128,0.12); }
  .ring-2 { inset: -16px; border-color: rgba(74,222,128,0.06); }
  .ring-3 { inset: -24px; border-color: rgba(74,222,128,0.03); }

  .avatar-ring.pulsing .ring-1 { animation: ripple 2s ease-out infinite; }
  .avatar-ring.pulsing .ring-2 { animation: ripple 2s ease-out infinite 0.4s; }
  .avatar-ring.pulsing .ring-3 { animation: ripple 2s ease-out infinite 0.8s; }

  @keyframes ripple {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.3); }
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a2e22 0%, #0d1f16 100%);
    border: 2px solid rgba(74,222,128,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    position: relative;
    z-index: 1;
  }

  .agent-info {
    text-align: center;
  }

  .agent-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .agent-role {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
    border: 1px solid;
    transition: all 0.3s ease;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .status-idle { background: rgba(136,145,168,0.1); border-color: rgba(136,145,168,0.2); color: var(--muted); }
  .status-idle .status-dot { background: var(--muted); }

  .status-calling { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: var(--amber); }
  .status-calling .status-dot { background: var(--amber); animation: blink 1s infinite; }

  .status-connected { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--accent); }
  .status-connected .status-dot { background: var(--accent); }

  .status-listening { background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.3); color: var(--accent2); }
  .status-listening .status-dot { background: var(--accent2); animation: blink 0.8s infinite; }

  .status-processing { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: var(--amber); }
  .status-processing .status-dot { background: var(--amber); animation: blink 0.5s infinite; }

  .status-speaking { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.4); color: var(--accent); }
  .status-speaking .status-dot { background: var(--accent); animation: blink 0.6s infinite; }

  .status-ended { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--danger); }
  .status-ended .status-dot { background: var(--danger); }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  .timer {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
  }

  .timer.inactive { color: var(--muted); font-size: 28px; }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent2);
    animation: wave 1.2s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 22px; }
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .btn {
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .btn:active { transform: scale(0.94); }

  .btn-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 20px;
  }

  .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-icon.active { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); color: var(--danger); }

  .btn-call {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    color: white;
    font-size: 28px;
    box-shadow: 0 0 0 0 rgba(74,222,128,0.4);
    animation: callPulse 2.5s ease-out infinite;
  }

  .btn-call:hover { transform: scale(1.06); }

  .btn-call-end {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    border: none;
    color: white;
    font-size: 28px;
    box-shadow: 0 0 0 0 rgba(248,113,113,0.4);
  }

  .btn-call-end:hover { transform: scale(1.06); }

  @keyframes callPulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    70% { box-shadow: 0 0 0 18px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  .transcript-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 160px;
    max-height: 260px;
  }

  .transcript-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .transcript-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .transcript-messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex: 1;
    padding-right: 4px;
    scroll-behavior: smooth;
  }

  .transcript-messages::-webkit-scrollbar { width: 3px; }
  .transcript-messages::-webkit-scrollbar-track { background: transparent; }
  .transcript-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .msg-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 99px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-user .msg-label { background: rgba(34,211,238,0.12); color: var(--accent2); border: 1px solid rgba(34,211,238,0.2); }
  .msg-ai .msg-label { background: rgba(74,222,128,0.12); color: var(--accent); border: 1px solid rgba(74,222,128,0.2); }
  .msg-system .msg-label { background: rgba(136,145,168,0.1); color: var(--muted); border: 1px solid rgba(136,145,168,0.15); }

  .msg-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding-top: 2px;
  }

  .msg-system .msg-text { color: var(--muted); font-style: italic; font-size: 13px; }

  .transcript-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    line-height: 1.6;
  }

  .info-row {
    display: flex;
    gap: 10px;
  }

  .info-chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-chip-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .info-chip-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .interim-text {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent2);
    font-style: italic;
    min-height: 40px;
    transition: all 0.2s;
  }

  .error-toast {
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    display: none;
  }

  .error-toast.show { display: block; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(251,191,36,0.2);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
  }

  select option { background: #1a1f2e; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>SUPERCHAT AI</h1>
    <p>Call Simulation System</p>
  </div>

  <div class="call-card">
    <div class="avatar-ring" id="avatarRing">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="avatar" id="avatarIcon">AI</div>
    </div>

    <div class="agent-info">
      <div class="agent-name">Nova Agent</div>
      <div class="agent-role">AI Customer Support</div>
    </div>

    <div class="status-badge status-idle" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Ready to call</span>
    </div>

    <div class="timer inactive" id="timer">--:--</div>

    <div class="waveform" id="waveform">
      <div class="wave-bar" style="animation-delay:0s"></div>
      <div class="wave-bar" style="animation-delay:0.1s"></div>
      <div class="wave-bar" style="animation-delay:0.2s"></div>
      <div class="wave-bar" style="animation-delay:0.3s"></div>
      <div class="wave-bar" style="animation-delay:0.4s"></div>
      <div class="wave-bar" style="animation-delay:0.5s"></div>
      <div class="wave-bar" style="animation-delay:0.4s"></div>
      <div class="wave-bar" style="animation-delay:0.3s"></div>
      <div class="wave-bar" style="animation-delay:0.2s"></div>
    </div>

    <div class="controls" id="controls">
      <button class="btn btn-icon" id="muteBtn" onclick="toggleMute()" title="Mute" disabled>
        🎤
      </button>
      <button class="btn btn-call" id="callBtn" onclick="startCall()">📞</button>
      <button class="btn btn-icon" id="endBtn" onclick="endCall()" title="End" disabled style="display:none">❌</button>
    </div>
  </div>

  <div class="info-row" id="infoRow" style="display:none">
    <div class="info-chip">
      <div class="info-chip-label">Duration</div>
      <div class="info-chip-value" id="durationChip">00:00</div>
    </div>
    <div class="info-chip">
      <div class="info-chip-label">Exchanges</div>
      <div class="info-chip-value" id="exchangeChip">0</div>
    </div>
    <div class="info-chip">
      <div class="info-chip-label">Mode</div>
      <div class="info-chip-value" id="modeChip">Voice</div>
    </div>
  </div>

  <div class="transcript-panel">
    <div class="transcript-header">
      <div class="transcript-title">Live Transcript</div>
      <select id="voiceSelect" onchange="changeVoice(this.value)">
        <option value="default">Voice: Default</option>
        <option value="1">Voice: Alto</option>
        <option value="2">Voice: Deep</option>
      </select>
    </div>
    <div class="transcript-messages" id="transcriptMessages">
      <div class="transcript-empty" id="emptyState">
        Press the green button to start your call.<br>
        <span style="font-size:11px; margin-top:6px; display:block; opacity:0.6">Microphone required · AI-powered responses</span>
      </div>
    </div>
  </div>

  <div class="interim-text" id="interimText" style="display:none">Listening...</div>
  <div class="error-toast" id="errorToast"></div>
</div>

<script>
const STATES = { IDLE:'idle', CALLING:'calling', CONNECTED:'connected', LISTENING:'listening', PROCESSING:'processing', SPEAKING:'speaking', ENDED:'ended' };

let state = STATES.IDLE;
let muted = false;
let timerInterval = null;
let seconds = 0;
let exchanges = 0;
let recognition = null;
let selectedVoiceIndex = 0;
let conversationHistory = [];
let currentUtterance = null;

const statusBadge = document.getElementById('statusBadge');
const statusText = document.getElementById('statusText');
const timer = document.getElementById('timer');
const avatarRing = document.getElementById('avatarRing');
const waveform = document.getElementById('waveform');
const callBtn = document.getElementById('callBtn');
const muteBtn = document.getElementById('muteBtn');
const endBtn = document.getElementById('endBtn');
const transcriptMessages = document.getElementById('transcriptMessages');
const emptyState = document.getElementById('emptyState');
const interimText = document.getElementById('interimText');
const errorToast = document.getElementById('errorToast');
const infoRow = document.getElementById('infoRow');
const durationChip = document.getElementById('durationChip');
const exchangeChip = document.getElementById('exchangeChip');
const modeChip = document.getElementById('modeChip');

function setState(s) {
  state = s;
  const classMap = { idle:'status-idle', calling:'status-calling', connected:'status-connected', listening:'status-listening', processing:'status-processing', speaking:'status-speaking', ended:'status-ended' };
  const labelMap = { idle:'Ready to call', calling:'Calling...', connected:'Connected', listening:'Listening...', processing:'Processing...', speaking:'AI Speaking', ended:'Call Ended' };
  statusBadge.className = 'status-badge ' + classMap[s];
  statusText.textContent = labelMap[s];
  avatarRing.className = 'avatar-ring' + (s === 'listening' || s === 'speaking' ? ' pulsing' : '');
  waveform.className = 'waveform' + (s === 'listening' ? ' active' : '');
}

function formatTime(s) { const m = Math.floor(s/60); return String(m).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }

function startTimer() {
  seconds = 0;
  timer.className = 'timer';
  timer.textContent = '00:00';
  timerInterval = setInterval(() => {
    seconds++;
    timer.textContent = formatTime(seconds);
    durationChip.textContent = formatTime(seconds);
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function showError(msg) {
  errorToast.textContent = '⚠ ' + msg;
  errorToast.classList.add('show');
  setTimeout(() => errorToast.classList.remove('show'), 4000);
}

function addMessage(role, text, isTyping = false) {
  if (emptyState) emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  const roleLabels = { user: 'YOU', ai: 'NOVA', system: 'SYS' };
  if (isTyping) {
    div.innerHTML = `<span class="msg-label">${roleLabels[role]||role}</span><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  } else {
    div.innerHTML = `<span class="msg-label">${roleLabels[role]||role}</span><span class="msg-text">${text}</span>`;
  }
  div.id = isTyping ? 'typingIndicator' : '';
  transcriptMessages.appendChild(div);
  transcriptMessages.scrollTop = transcriptMessages.scrollHeight;
  return div;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function changeVoice(v) { selectedVoiceIndex = parseInt(v) || 0; }

function speak(text, onEnd) {
  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > selectedVoiceIndex) utt.voice = voices[selectedVoiceIndex];
  utt.rate = 0.95;
  utt.pitch = 1.05;
  currentUtterance = utt;
  utt.onend = () => { currentUtterance = null; onEnd && onEnd(); };
  utt.onerror = () => { currentUtterance = null; onEnd && onEnd(); };
  window.speechSynthesis.speak(utt);
}

async function callAI(userText) {
  setState(STATES.PROCESSING);
  interimText.style.display = 'none';
  const typingEl = addMessage('ai', '', true);

  conversationHistory.push({ role: 'user', content: userText });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are Nova, a friendly and professional AI customer support agent in a phone call simulation. Keep responses conversational, warm, and concise (2-4 sentences max). You help with general inquiries, product questions, and support. Speak naturally as if on a phone call. Do not use markdown, bullet points, or formatting — speak in plain conversational sentences only.`,
        messages: conversationHistory
      })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const aiText = data.content?.[0]?.text || "I'm sorry, I didn't catch that. Could you repeat?";
    conversationHistory.push({ role: 'assistant', content: aiText });
    exchanges++;
    exchangeChip.textContent = exchanges;

    removeTyping();
    addMessage('ai', aiText);

    setState(STATES.SPEAKING);
    speak(aiText, () => {
      if (state !== STATES.ENDED) {
        setState(STATES.LISTENING);
        startListening();
      }
    });

  } catch (err) {
    removeTyping();
    const fallback = "I'm having a bit of trouble on my end. Could you try again?";
    addMessage('ai', fallback);
    speak(fallback, () => {
      if (state !== STATES.ENDED) { setState(STATES.LISTENING); startListening(); }
    });
    showError('API error: ' + err.message);
  }
}

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showError('Speech recognition not supported. Use Chrome.');
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  interimText.style.display = 'block';
  interimText.textContent = 'Listening... speak now';
  setState(STATES.LISTENING);

  recognition.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) interimText.textContent = interim;
    if (final.trim()) {
      interimText.style.display = 'none';
      addMessage('user', final.trim());
      callAI(final.trim());
    }
  };

  recognition.onerror = (e) => {
    interimText.style.display = 'none';
    if (e.error === 'no-speech') {
      if (state !== STATES.ENDED) startListening();
    } else if (e.error === 'not-allowed') {
      showError('Microphone access denied. Please allow microphone.');
      endCall();
    } else {
      if (state !== STATES.ENDED) startListening();
    }
  };

  recognition.onend = () => {
    if (state === STATES.LISTENING) startListening();
  };

  if (!muted) recognition.start();
}

async function startCall() {
  if (state !== STATES.IDLE && state !== STATES.ENDED) return;

  callBtn.style.display = 'none';
  endBtn.style.display = 'flex';
  muteBtn.disabled = false;
  infoRow.style.display = 'flex';
  exchanges = 0;
  exchangeChip.textContent = '0';
  conversationHistory = [];
  modeChip.textContent = 'Voice';

  setState(STATES.CALLING);
  timer.className = 'timer';
  timer.textContent = '00:00';

  await new Promise(r => setTimeout(r, 1500));
  if (state === STATES.ENDED) return;

  setState(STATES.CONNECTED);
  startTimer();

  const greeting = "Hello! Thank you for calling. I'm Nova, your AI assistant. How can I help you today?";
  addMessage('system', 'Call connected');
  addMessage('ai', greeting);

  setState(STATES.SPEAKING);
  speak(greeting, () => {
    if (state !== STATES.ENDED) {
      setState(STATES.LISTENING);
      startListening();
    }
  });
}

function endCall() {
  if (recognition) { try { recognition.stop(); recognition.abort(); } catch(e){} recognition = null; }
  if (currentUtterance) { window.speechSynthesis?.cancel(); currentUtterance = null; }
  stopTimer();
  setState(STATES.ENDED);

  callBtn.style.display = 'flex';
  callBtn.className = 'btn btn-call';
  callBtn.onclick = restartCall;
  callBtn.textContent = '🔄';
  endBtn.style.display = 'none';
  muteBtn.disabled = true;
  interimText.style.display = 'none';

  timer.className = 'timer inactive';

  const dur = formatTime(seconds);
  addMessage('system', `Call ended · Duration: ${dur} · Exchanges: ${exchanges}`);
}

function restartCall() {
  callBtn.textContent = '📞';
  callBtn.onclick = startCall;
  transcriptMessages.innerHTML = '';
  emptyState.style.display = 'block';
  transcriptMessages.appendChild(emptyState);
  timer.textContent = '--:--';
  timer.className = 'timer inactive';
  setState(STATES.IDLE);
  startCall();
}

function toggleMute() {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🎤';
  muteBtn.className = 'btn btn-icon' + (muted ? ' active' : '');
  if (muted && recognition) { try { recognition.stop(); } catch(e){} }
  else if (!muted && state === STATES.LISTENING) { startListening(); }
  addMessage('system', muted ? 'Microphone muted' : 'Microphone unmuted');
}

window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener?.('voiceschanged', () => {});
</script>
